---
name: build-and-push

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  release-image:
    runs-on: [deploy, uopve]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build and push
        run: |
          echo "REGISTRY=${{ vars.REGISTRY }}"
          docker build -t ${{ vars.REGISTRY }}/kilocli-server:latest -f ./Dockerfile .
          docker push ${{ vars.REGISTRY }}/kilocli-server:latest
